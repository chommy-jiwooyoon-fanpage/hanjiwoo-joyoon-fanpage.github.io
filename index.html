<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지우 x 조윤 팬페이지</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background: #f0f4ff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .entrance-banner { width: 90%; max-width: 600px; margin: 30px auto 10px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .entrance-banner img { width: 100%; height: auto; display: block; }
        .entrance-icon { font-size: 1.8rem; margin: 20px 0; color: #7baaff; cursor: pointer; }

        /* SNS 버튼 - 오른쪽 하단 고정 */
        .sns-fixed-container { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 12px; z-index: 10000; }
        .sns-link { text-decoration: none; color: white; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .sns-link:hover { transform: scale(1.1); }
        .x-icon { background: #000; border-radius: 50%; }
        .ig-icon { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="entrance-banner"><img src="main.jpg" alt="메인 배너"></div>
    
    <div class="entrance-icon" onclick="location.href='menu.html'">✔️</div>

    <div class="sns-fixed-container">
        <a href="https://twitter.com/zzomzom_" target="_blank" class="sns-link x-icon">X</a>
        <a href="https://instagram.com/chommy_9" target="_blank" class="sns-link ig-icon">IG</a>
    </div>

</body>
</html>

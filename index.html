<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAN JIWOO FANPAGE</title>
    <style>
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.6);
            object-fit: cover;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }
        .main-content { text-align: center; z-index: 1; }
        .main-title { font-size: 3rem; font-weight: 800; letter-spacing: 15px; margin-bottom: 50px; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .menu-container { display: flex; gap: 30px; }
        .menu-btn {
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 4px;
            padding: 12px 35px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            transition: 0.4s;
        }
        .menu-btn:hover { background: white; color: #a5b8d0; transform: translateY(-5px); }
        .footer { position: absolute; bottom: 30px; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline class="video-background">
        <source src="promo.mp4" type="video/mp4">
    </video>
    <div class="main-content">
        <div class="main-title">HAN JIWOO</div>
        <div class="menu-container">

</html>

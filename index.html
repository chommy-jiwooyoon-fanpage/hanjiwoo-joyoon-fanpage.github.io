<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지우 x 조윤 팬페이지</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background: #f0f4ff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .entrance-banner { width: 90%; max-width: 600px; margin: 30px auto 10px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .entrance-banner img { width: 100%; height: auto; display: block; }
        .entrance-icon { font-size: 1.8rem; margin: 20px 0; color: #7baaff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="entrance-banner"><img src="main.jpg" alt="메인 배너"></div>
    <div class="entrance-icon" onclick="location.href='menu.html'">✔️</div>

    <div style="position: fixed; bottom: 15px; right: 15px; display: flex; gap: 8px; z-index: 10000; opacity: 0.5;">
        <a href="https://twitter.com/zzomzom_" target="_blank" style="text-decoration: none; font-size: 11px; color: #888; background: rgba(255,255,255,0.7); padding: 3px 6px; border-radius: 4px; border: 1px solid #ddd;">X</a>
        <a href="https://instagram.com/chommy_9" target="_blank" style="text-decoration: none; font-size: 11px; color: #888; background: rgba(255,255,255,0.7); padding: 3px 6px; border-radius: 4px; border: 1px solid #ddd;">IG</a>
    </div>

    <div id="board-placeholder"></div>
    <script>
        fetch('board.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('board-placeholder').innerHTML = data;
            });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지우 x 조윤 팬페이지</title>
    <style>
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #fff5f5 0%, #f0f4ff 100%); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* 대문 사진 (액자형 고정) */
        .entrance-banner {
            width: 90%; max-width: 600px;
            margin: 30px auto 10px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .entrance-banner img { width: 100%; height: auto; display: block; }

        /* 쫌좀님이 좋아하는 체크 아이콘 (클릭 버튼) */
        .entrance-icon { 
            font-size: 1.8rem; 
            margin: 20px 0; 
            color: #7baaff; /* 쫌좀님이 말씀하신 파란색 체크 */
            cursor: pointer;
            animation: bounce 2s infinite;
            transition: 0.3s;
        }
        .entrance-icon:hover { transform: scale(1.2); color: #ff6b6b; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-8px);}
            60% {transform: translateY(-4px);}
        }

        /* 이름 및 SNS 섹션 */
        .intro-section { padding: 10px; transition: 0.5s; }
        .actor-name { font-size: 2.5rem; font-weight: 800; color: #222; margin-bottom: 10px; }
        .heart { color: #ff6b6b; }
        .sns-container { margin-top: 15px; }
        .btn { 
            display: inline-block; padding: 10px 20px; margin: 5px; 
            border-radius: 30px; text-decoration: none; font-weight: 600; color: white; font-size: 0.85rem;
        }
        .twitter { background-color: #1DA1F2; }
        .instagram { background-color: #E1306C; }

        /* 숨겨져 있다가 나타날 메뉴 섹션 */
        #menu-section { 
            width: 100%; max-width: 450px; padding: 20px; 
            display: none; /* 처음엔 숨김 */
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
        }
        
        /* 나타날 때의 효과 */
        #menu-section.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .menu-card {
            background: white; border-radius: 20px; padding: 18px 25px; margin-bottom: 15px;
            display: flex; align-items: center; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .menu-card:hover { transform: scale(1.02); border: 1px solid #7baaff; }
        .menu-icon { font-size: 1.6rem; margin-right: 20px; }
        .menu-text { flex-grow: 1; text-align: left; }
        .sub-label { font-size: 0.65rem; color: #7baaff; font-weight: 800; letter-spacing: 1px; }
        .main-label { font-size: 1.05rem; font-weight: 600; color: #333; margin-top: 2px; }
        .arrow { color: #eee; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="entrance-banner">
        <img src="main.jpg" alt="메인 배너">
    </div>

    <div class="entrance-icon" onclick="showMenu()">✔️</div>

    <div class="intro-section" id="intro">
        <div class="actor-name">한지우 <span class="heart">♥</span> 조윤</div>
        <div class="sns-container">
            <a href="https://twitter.com/zzomzom_" target="_blank" class="btn twitter">Twitter @zzomzom_</a>
            <a href="https://instagram.com/chommy_9" target="_blank" class="btn instagram">Instagram @chommy_9</a>
        </div>
    </div>

    <div id="menu-section">
        <div class="menu-card" onclick="location.href='jiwoo-works.html'">
            <div class="menu-icon">🎬</div>
            <div class="menu-text">
                <span class="sub-label">FILMOGRAPHY</span>
                <div class="main-label">한지우 작품집</div>
            </div>
            <div class="arrow">→</div>
        </div>

        <div class="menu-card" onclick="location.href='joyoon-works.html'">
            <div class="menu-icon">🎞️</div>
            <div class="menu-text">
                <span class="sub-label">FILMOGRAPHY</span>
                <div class="main-label">조윤 작품집</div>
            </div>
            <div class="arrow">→</div>
        </div>
    </div>

    <script>
        function showMenu() {
            const menu = document.getElementById('menu-section');
            const intro = document.getElementById('intro');
            
            // 메뉴 나타나게 하기
            menu.style.display = 'block';
            setTimeout(() => {
                menu.classList.add('show');
                // 메뉴가 잘 보이도록 화면을 아래로 부드럽게 이동
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 10);
            
            // 체크 아이콘 클릭 시 강조 효과
            document.querySelector('.entrance-icon').style.animation = 'none';
        }
    </script>

</body>
</html>

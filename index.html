<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GUEST BOOK</title>
    <style>
        body { margin: 0; background-color: #ebf1f6; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .nav-bar { display: flex; justify-content: flex-start; padding: 20px; max-width: 600px; margin: 0 auto; }
        .home-icon { font-size: 1.2rem; color: #a5b8d0; text-decoration: none; cursor: pointer; }
        .board-container { width: 92%; max-width: 600px; margin: 10px auto; padding: 25px; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); box-sizing: border-box; }
        .board-title { color: #a5b8d0; text-align: center; letter-spacing: 5px; font-size: 1.1rem; margin-bottom: 25px; font-weight: 300; }
        .input-box { width: 100%; padding: 18px; border: 1px solid #f0f4f8; border-radius: 20px; font-size: 0.9rem; outline: none; background: #f9fbfc; box-sizing: border-box; color: #666; margin-bottom: 12px; resize: none; }
        .submit-btn { width: 100%; background: #a5b8d0; color: white; border: none; padding: 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.85rem; letter-spacing: 2px; }
        #post-list { margin-top: 35px; display: flex; flex-direction: column; gap: 15px; }
        .post-card { background: #fff; padding: 18px; border-radius: 20px; border: 1px solid #f4f7f9; }
        .post-content { font-size: 0.85rem; color: #555; line-height: 1.6; margin: 0; white-space: pre-wrap; }
        .post-info { font-size: 0.7rem; color: #cbd5e0; margin-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="menu.html" class="home-icon">🏠</a> 
    </div>
    <div class="board-container">
        <h2 class="board-title">GUEST BOOK</h2>
        <textarea id="postInput" class="input-box" rows="3" placeholder="지우님께 따뜻한 한마디를 남겨주세요!"></textarea>
        <button id="saveBtn" class="submit-btn">작성 완료</button>
        <div id="post-list"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDXz0NasgyMsWtlXriyqocMF1Tqe2FJXkg",
        authDomain: "jiwoo-fan.firebaseapp.com",
        projectId: "jiwoo-fan",
        storageBucket: "jiwoo-fan.firebasestorage.app",
        messagingSenderId: "70224934316",
        appId: "1:70224934316:web:2ad83d9e1c55f20e7bf609"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const postsCol = collection(db, "posts");

    document.getElementById('saveBtn').onclick = async () => {
        const content = document.getElementById('postInput').value;
        if (!content.trim()) return;
        await addDoc(postsCol, { text: content, createdAt: serverTimestamp() });
        document.getElementById('postInput').value = "";
    };

    onSnapshot(query(postsCol, orderBy("createdAt", "desc")), (snapshot) => {
        const list = document.getElementById('post-list');
        list.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : "방금 전";
            list.innerHTML += `<div class="post-card"><p class="post-content">${data.text}</p><div class="post-info"><span>익명팬</span><span>${date}</span></div></div>`;
        });
    });
</script>
</body>
</html>

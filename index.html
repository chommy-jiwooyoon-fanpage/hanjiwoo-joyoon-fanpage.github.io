<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAN JI WOO x CHO YOON</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ebf1f6; font-family: 'Apple SD Gothic Neo', sans-serif; }

        /* [1] 인트로 영상 레이어 */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000; display: none; justify-content: center; align-items: center; cursor: pointer;
        }
        .intro-video { max-width: 100%; max-height: 100%; }

        /* [2] 메인 대문 디자인 (원본 비율) */
        #main-content {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .bgm-controls { position: absolute; top: 30px; left: 30px; display: flex; align-items: center; gap: 10px; }
        .bgm-btn {
            background: rgba(255, 255, 255, 0.8); border: 1px solid #ddd;
            border-radius: 20px; padding: 5px 15px; font-size: 0.7rem;
            color: #a5b8d0; cursor: pointer; letter-spacing: 1px;
        }

        .img-container {
            width: 480px; height: 270px;
            background: url('main.jpg') no-repeat center center;
            background-size: cover; border: 8px solid white;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .sub-title { font-size: 0.8rem; color: #a5b8d0; letter-spacing: 6px; margin-bottom: 40px; text-transform: uppercase; }

        .enter-btn {
            padding: 10px 50px; border: 1.5px solid #a5b8d0; border-radius: 30px;
            background: white; color: #a5b8d0; text-decoration: none;
            font-size: 0.75rem; font-weight: bold; letter-spacing: 3px; transition: 0.3s;
        }
        .enter-btn:hover { background: #a5b8d0; color: white; }
    </style>
</head>
<body>

    <div id="intro-layer" onclick="enableAudio()">
        <video id="myVideo" autoplay muted playsinline class="intro-video">
            <source src="promo.mp4" type="video/mp4">
        </video>
        <div style="position:absolute; color:white; bottom:20px; font-size:0.8rem; opacity:0.5;">화면을 클릭하면 소리가 나옵니다</div>
    </div>

    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="main-content">
        <div class="bgm-controls"><div class="bgm-btn">||| &nbsp; 01 &nbsp; →</div></div>
        <div class="img-container"></div>
        <div class="sub-title">ETERNAL SUNSHINE</div>
        <a href="menu.html" class="enter-btn">ENTER</a>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const bgm = document.getElementById('bgm');
        const intro = document.getElementById('intro-layer');
        const main = document.getElementById('main-content');

        // 세션 확인: 이번 접속에 이미 봤다면 영상 스킵
        const hasSeenIntro = sessionStorage.getItem('visited');

        if (!hasSeenIntro) {
            intro.style.display = 'flex';
            sessionStorage.setItem('visited', 'true');
        } else {
            // 이미 방문했다면 영상 레이어 아예 삭제 (소리 겹침 방지)
            intro.remove(); 
            main.style.display = 'flex';
        }

        // 클릭 시 소리 켜고 영상 계속 재생
        function enableAudio() {
            video.muted = false;
            // 만약 영상이 끝나기 전에 클릭했다면 메인으로 넘기지 않고 소리만 켬
            // 영상이 거의 끝났을 때 클릭하면 바로 메인으로 이동
            if (video.currentTime > video.duration - 0.5) {
                showMain();
            }
        }

        function showMain() {
            video.pause();
            video.src = ""; // 영상 소스 제거 (뒤로 가기 시 소리 안 나게 확실히 차단)
            intro.style.display = 'none';
            main.style.display = 'flex';
            bgm.play().catch(e => {});
        }

        video.onended = function() { showMain(); };
    </script>
</body>
</html>

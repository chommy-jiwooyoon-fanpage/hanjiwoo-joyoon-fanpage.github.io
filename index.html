<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지우 x 조윤 팬페이지</title>
    <style>
        /* 11.JPG의 부드러운 배경색과 정렬 복구 */
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #fff5f5 0%, #f0f4ff 100%); 
            margin: 0; padding: 0; 
        }

        /* 대문 이미지 슬림하게 고정 (너무 크지 않게!) */
        .entrance-banner {
            width: 100%;
            max-height: 300px; /* 사진 높이를 딱 300px로 고정해서 크기 조절 */
          .entrance-banner {
            width: 100%;
            height: 180px;
            max-height: 180px;
            overflow: hidden;
            background-color: #000;
        }

        .entrance-banner img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            cursor: pointer;
        }
}
        /* 11.JPG 스타일의 폰트와 버튼 유지 */
        .content { padding: 50px 20px; }
        .actor-name { font-size: 3rem; font-weight: 800; color: #222; margin-top: 20px; }
        .heart { color: #ff6b6b; }
        .sns-container { margin-top: 40px; }
        .btn { 
            display: inline-block; padding: 14px 28px; margin: 10px; 
            border-radius: 30px; text-decoration: none; font-weight: 600; color: white; 
        }
        .twitter { background-color: #1DA1F2; }
        .instagram { background-color: #E1306C; }
    </style>
</head>
<body>

    <div class="entrance-banner" onclick="window.scrollTo({top: 500, behavior: 'smooth'})">
        <img src="main.jpg" alt="메인 배너">
    </div>

    <div class="content">
        <div class="actor-name">한지우 <span class="heart">♥</span> 조윤</div>
        <p>배우 한지우와 조윤을 응원하는 <strong>쫌좀</strong>의 기록 공간입니다.</p>
        
        <div class="sns-container">
            <a href="https://twitter.com/zzomzom_" target="_blank" class="btn twitter">Twitter @zzomzom_</a>
            <a href="https://instagram.com/chommy_9" target="_blank" class="btn instagram">Instagram @chommy_9</a>
        </div>
    </div>

</body>
</html>

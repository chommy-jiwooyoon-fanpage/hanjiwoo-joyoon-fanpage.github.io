<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAN JI WOO x CHO YOON</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #ebf1f6; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        /* [1] 시네마틱 인트로 레이어 */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000; display: none; 
            justify-content: center; align-items: center;
        }

        .video-wrapper {
            width: 88%; 
            max-width: 900px;
            aspect-ratio: 16 / 9;
            display: flex; justify-content: center; align-items: center;
            background: #000;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .intro-video { 
            width: 100%; height: auto; 
            cursor: pointer; 
            object-fit: contain;
        }

        /* [2] 메인 대문 디자인 */
        #main-content {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            box-sizing: border-box;
        }

        .img-container {
            width: 85vw; max-width: 480px; aspect-ratio: 16 / 9;
            background: url('main.jpg') no-repeat center center;
            background-size: cover; border: 6px solid white;
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            margin-bottom: 5vh;
        }

        .sub-title { 
            font-size: clamp(0.65rem, 2vw, 0.8rem); 
            color: #a5b8d0; 
            letter-spacing: 0.4em; 
            margin-bottom: 6vh; 
            text-transform: uppercase; 
        }
        
        .enter-btn {
            padding: 12px 60px; border: 1.5px solid #a5b8d0; border-radius: 35px;
            background: white; color: #a5b8d0; text-decoration: none;
            font-size: 0.75rem; font-weight: bold; letter-spacing: 3px;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div id="intro-layer">
        <div class="video-wrapper">
            <video id="myVideo" autoplay muted playsinline preload="auto" class="intro-video" onclick="handleVideoClick()">
                <source src="promo.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div id="main-content">
        <div class="img-container"></div>
        <div class="sub-title">ETERNAL SUNSHINE</div>
        <a href="menu.html" class="enter-btn">ENTER</a>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const intro = document.getElementById('intro-layer');
        const main = document.getElementById('main-content');

        // 방문 기록 체크해서 인트로 보여줄지 결정
        const hasSeenIntro = sessionStorage.getItem('visited');
        if (!hasSeenIntro) {
            intro.style.display = 'flex';
            sessionStorage.setItem('visited', 'true');
        } else {
            intro.remove(); 
            main.style.display = 'flex';
        }

        function handleVideoClick() {
            if (video.muted) { 
                video.muted = false; 
            } else { 
                showMain(); 
            }
        }

        function showMain() {
            video.pause();
            intro.style.display = 'none';
            main.style.display = 'flex';
        }

        video.onended = function() { showMain(); };
    </script>
</body>
</html>

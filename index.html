<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETERNAL SUNSHINE</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #eef2f6; 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            font-family: 'Apple SD Gothic Neo', sans-serif; overflow: hidden;
        }

        /* 📸 상단 대표 사진 (main.jpg) */
        .main-image {
            max-width: 80%; /* 화면에 너무 꽉 차지 않게 적당히 조절 */
            height: auto;
            margin-bottom: 40px; 
            border-radius: 30px; /* 모서리를 부드럽게 */
            /* 사진을 띄워 보이게 하는 은은한 그림자 */
            box-shadow: 20px 20px 40px #d1d9e6, -20px -20px 40px #ffffff;
        }

        /* 메인 타이틀 */
        .main-title {
            font-size: 2.2rem; font-weight: 200; color: #8ea8c9;
            letter-spacing: 12px; margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* ENTER 버튼 (4.gif 쫀득한 스타일) */
        .enter-btn { 
            text-decoration: none; 
            width: 220px; height: 80px; 
            background: #eef2f6; border-radius: 40px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: #8ea8c9; letter-spacing: 5px;
            /* 기본 상태: 튀어나온 입체 효과 */
            box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff; 
            transition: all 0.3s ease; 
        }

        /* 마우스를 올렸을 때: 쫀득하게 눌리는 효과 */
        .enter-btn:hover { 
            box-shadow: inset 8px 8px 16px #d1d9e6, inset -8px -8px 16px #ffffff; 
            transform: scale(0.98); 
        }
    </style>
</head>
<body>
    <img src="main.jpg" alt="대표 사진" class="main-image">

    <h1 class="main-title">ETERNAL SUNSHINE</h1>
    
    <a href="menu.html" class="enter-btn">ENTER</a>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAN JIWOO FANPAGE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Apple SD Gothic Neo', sans-serif; }

        /* [1] 인트로 영상 레이어 */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; cursor: pointer; transition: opacity 1s ease;
        }
        .intro-video { width: 100%; height: 100%; object-fit: cover; }
        .click-notice {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 0.9rem; letter-spacing: 2px; opacity: 0.7;
            animation: blink 2s infinite;
        }

        /* [2] 메인 대문 사진 레이어 (처음엔 숨김) */
        #main-content {
            display: none; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('board.png'); /* 쫌좀님의 메인 사진 */
            background-size: cover; background-position: center;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .main-title { font-size: 3.5rem; color: white; font-weight: 800; letter-spacing: 15px; margin-bottom: 40px; }
        .menu-container { display: flex; gap: 30px; }
        .menu-btn {
            text-decoration: none; color: white; font-size: 0.9rem; font-weight: bold;
            padding: 12px 35px; border: 1px solid white; border-radius: 30px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); transition: 0.4s;
        }
        .menu-btn:hover { background: white; color: black; }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="intro-layer" onclick="showMain()">
        <video id="myVideo" autoplay muted playsinline class="intro-video">
            <source src="promo.mp4" type="video/mp4">
        </video>
        <div class="click-notice">CLICK TO ENTER</div>
    </div>

    <div id="main-content">
        <div class="main-title">HAN JIWOO</div>
        <div class="menu-container">
            <a href="jiwoo-list.html" class="menu-btn">VIDEO LIST</a>
            <a href="guestbook.html" class="menu-btn">GUESTBOOK</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const intro = document.getElementById('intro-layer');
        const main = document.getElementById('main-content');

        // 메인 화면으로 전환하는 함수
        function showMain() {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.display = 'flex';
            }, 1000);
        }

        // 영상이 다 끝나면 자동으로 메인 이동
        video.onended = function() {
            showMain();
        };
    </script>

</body>
</html>

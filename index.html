<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지우 x 조윤 팬페이지</title>
    <style>
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #fff5f5 0%, #f0f4ff 100%); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* 대문 사진 스타일 (2.JPG의 예쁜 액자형 유지) */
        .entrance-banner {
            width: 90%;
            max-width: 600px;
            margin: 30px auto 10px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .entrance-banner img { width: 100%; height: auto; display: block; cursor: pointer; }

        /* 쫌좀님의 명령: 사진 바로 밑 체크/입구 아이콘 */
        .entrance-icon {
            font-size: 1.5rem;
            margin: 15px 0; /* 사진과 이름 사이의 적당한 간격 */
            color: #ff6b6b;
            animation: bounce 2s infinite; /* 부드럽게 위아래로 움직이는 효과 */
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-5px);}
            60% {transform: translateY(-3px);}
        }

        /* 쫌좀님의 명령: 이름 섹션을 아래로 더 내림 */
        .content { padding: 30px 20px 50px; } /* 상단 여백을 늘려 아래로 배치 */
        .actor-name { font-size: 2.5rem; font-weight: 800; color: #222; margin: 20px 0; }
        .heart { color: #ff6b6b; }
        .sns-container { margin-top: 30px; }
        .btn { 
            display: inline-block; padding: 12px 24px; margin: 8px; 
            border-radius: 30px; text-decoration: none; font-weight: 600; color: white; 
        }
        .twitter { background-color: #1DA1F2; }
        .instagram { background-color: #E1306C; }
    </style>
</head>
<body>

    <div class="entrance-banner">
        <img src="main.jpg" alt="메인 사진">
    </div>

    <div class="entrance-icon">✔️</div>

    <div class="content">
        <div class="actor-name">한지우 <span class="heart">♥</span> 조윤</div>
        <p>배우 한지우와 조윤을 응원하는 <strong>쫌좀</strong>의 기록 공간입니다.</p>
        
        <div class="sns-container">
            <a href="https://twitter.com/zzomzom_" target="_blank" class="btn twitter">Twitter @zzomzom_</a>
            <a href="https://instagram.com/chommy_9" target="_blank" class="btn instagram">Instagram @chommy_9</a>
        </div>
    </div>

</body>
</html>

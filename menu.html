<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SELECT ACTOR</title>
    <style>
        body { margin: 0; background: #eef2f6; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .actor-container { display: flex; gap: 40px; }
        .actor-card { 
            text-decoration: none; width: 220px; height: 120px; background: #eef2f6; 
            border-radius: 35px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff; transition: 0.4s; 
        }
        .actor-name { font-size: 1.1rem; font-weight: 900; color: #444; }
        .actor-card:hover { transform: translateY(-10px); background: #8ea8c9; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .actor-card:hover .actor-name { color: white; }
    </style>
</head>
<body>
    <div class="actor-container">
        <a href="jiwoo-list.html" class="actor-card"><span class="actor-name">HAN JI WOO</span></a>
        <a href="joyoon-list.html" class="actor-card"><span class="actor-name">CHO YOON</span></a>
    </div>
</body>
</html>

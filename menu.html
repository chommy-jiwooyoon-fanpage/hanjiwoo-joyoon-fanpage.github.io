<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELECT ACTOR</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #eef2f6; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .bgm-player { position: fixed; top: 30px; left: 30px; z-index: 10001; display: flex; align-items: center; gap: 15px; padding: 10px 20px; background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(15px); border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.4); }
        .visualizer { display: flex; align-items: center; gap: 3px; height: 12px; cursor: pointer; }
        .bar { width: 2px; height: 100%; background: #8ea8c9; border-radius: 2px; transition: 0.3s; }
        .playing .bar { animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 12px; } }
        .control-group { display: flex; align-items: center; gap: 12px; border-left: 1px solid rgba(142, 168, 201, 0.3); padding-left: 12px; }
        .btn-icon { cursor: pointer; color: #8ea8c9; font-size: 14px; user-select: none; }
        
        .menu-container { display: flex; gap: 40px; }
        .actor-card { width: 200px; padding: 40px 20px; background: white; border-radius: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .actor-card:hover { transform: translateY(-10px); background: #8ea8c9; color: white; border-color: #8ea8c9; }
        .actor-name { font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="bgm-player">
        <div class="visualizer" id="visualizer" onclick="toggleMusic()"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="control-group"><div class="track-num" id="track-info" style="font-size:10px; color:#8ea8c9; font-weight:800;">01</div><div class="btn-icon" onclick="nextMusic()" style="margin-left:10px;">→</div></div>
        <audio id="main-bgm" onended="nextMusic()"><source id="audio-source" src="bgm1.mp3" type="audio/mpeg"></audio>
    </div>

    <div class="menu-container">
        <div class="actor-card" onclick="location.href='jiwoo-list.html'"><div class="actor-name">HAN JI WOO</div></div>
        <div class="actor-card" onclick="location.href='joyoon-list.html'"><div class="actor-name">CHO YOON</div></div>
    </div>

    <script>
        const playlist = ["bgm1.mp3", "bgm2.mp3", "bgm3.mp3"]; let currentTrack = 0;
        const music = document.getElementById('main-bgm'); const source = document.getElementById('audio-source');
        const trackInfo = document.getElementById('track-info'); const visualizer = document.getElementById('visualizer');
        function toggleMusic() { if (music.paused) { music.play(); visualizer.classList.add('playing'); } else { music.pause(); visualizer.classList.remove('playing'); } }
        function nextMusic() { currentTrack = (currentTrack + 1) % playlist.length; source.src = playlist[currentTrack]; music.load(); music.play(); trackInfo.innerText = (currentTrack + 1).toString().padStart(2, '0'); visualizer.classList.add('playing'); }
    </script>
</body>
</html>

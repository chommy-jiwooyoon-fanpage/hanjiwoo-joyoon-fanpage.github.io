<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>익명게시판</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #eef2f6; 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; font-family: 'Apple SD Gothic Neo', sans-serif; 
        }

        /* 🏠 좌측 상단 아이콘 (고정) */
        .side-nav { position: fixed; left: 30px; top: 30px; z-index: 100; }
        .nav-btn { 
            width: 45px; height: 45px; background: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-decoration: none; 
        }

        /* 📝 쫌좀님이 말씀하신 한글 대제목 */
        .main-title {
            margin-top: 80px; font-size: 2.2rem; font-weight: 900; 
            color: #8ea8c9; letter-spacing: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* 💬 게시판 본체 (실제 작동하는 구역) */
        .board-container {
            width: 90%; max-width: 800px; margin: 40px 0 100px 0;
            background: #eef2f6; border-radius: 40px; padding: 30px;
            box-shadow: inset 10px 10px 20px #d1d9e6, inset -10px -10px 20px #ffffff;
        }

        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #8ea8c9; font-size: 0.85rem; font-weight: 700; }
    </style>
</head>
<body>

    <div class="side-nav">
        <a href="index.html" class="nav-btn">🏠</a>
    </div>

    <h1 class="main-title">익명게시판</h1>

    <div class="board-container">
        <p style="text-align: center; color: #8ea8c9; font-weight: bold;">
            아래에 팬분들의 따뜻한 한마디를 남겨주세요!
        </p>
        <div style="height: 400px; border: 2px dashed #d1d9e6; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #aaa;">
            (이곳에 실제 글쓰기 창이 나타납니다)
        </div>
    </div>

    <a href="menu.html" class="back-link">← BACK TO MENU</a>

</body>
</html>

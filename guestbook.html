<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>익명게시판</title>
    <style>
        /* 쫌좀님이 고르신 하늘색 톤 배경 */
        body { margin: 0; padding: 0; background: #eef2f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        .side-nav { position: fixed; left: 30px; top: 30px; }
        .nav-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .main-title { margin-top: 80px; font-size: 2.2rem; font-weight: 900; color: #8ea8c9; letter-spacing: 5px; }

        /* 쫌좀님이 원하시는 그 하얀색 깔끔한 메모장 박스 */
        .board-container { 
            width: 90%; max-width: 600px; margin-top: 40px; 
            background: white; border-radius: 20px; padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        /* 입력창 스타일: 군더더기 없이 하얗게 */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 10px; padding: 15px; resize: none; box-sizing: border-box; }
        
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; }
        .btn { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-reg { background: #8ea8c9; color: white; } /* 등록 버튼 */
        .btn-del { background: #f4f4f4; color: #666; }  /* 삭제 버튼 */

        /* 리스트 영역 */
        .comment-list { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .comment-item { padding: 15px 0; border-bottom: 1px dotted #eee; color: #444; }
        .comment-meta { font-size: 0.8rem; color: #999; margin-bottom: 5px; }

        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #8ea8c9; font-size: 0.85rem; font-weight: 700; }
    </style>
</head>
<body>

    <div class="side-nav"><a href="index.html" class="nav-btn">🏠</a></div>
    <h1 class="main-title">익명게시판</h1>

    <div class="board-container">
        <div class="input-group">
            <textarea placeholder="익명으로 자유롭게 남겨주세요."></textarea>
            <div class="btn-group">
                <button class="btn btn-del">삭제</button>
                <button class="btn btn-reg">등록</button>
            </div>
        </div>

        <div class="comment-list">
            <div class="comment-item">
                <div class="comment-meta">익명 | 2026-03-06</div>
                <div>깔끔한 게시판 테스트입니다.</div>
            </div>
        </div>
    </div>

    <a href="menu.html" class="back-link">← BACK TO MENU</a>

</body>
</html>

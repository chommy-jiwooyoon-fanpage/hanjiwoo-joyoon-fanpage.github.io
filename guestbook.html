<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUESTBOOK</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background: #f0f4ff; margin: 0; padding: 40px 20px; }
        .fixed-btn { position: fixed; left: 20px; width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 9999; text-decoration: none; }
        .board-card { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .msg-box { background: #f9fbff; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; border: 1px solid #eef2ff; }
        .admin-tag { color: #7baaff; font-weight: 800; font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>

    <a href="index.html" class="fixed-btn" style="top: 20px;">🏠</a>

    <div class="board-card">
        <h2 style="color: #333; margin-bottom: 25px;">💬 익명 한줄평</h2>
        
        <div style="margin-bottom: 30px;">
            <textarea id="input-text" placeholder="내용을 입력해주세요." style="width: 100%; height: 80px; border: 1px solid #eee; border-radius: 12px; padding: 12px; box-sizing: border-box;"></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                <input type="password" id="input-pw" placeholder="암호" style="width: 100px; padding: 8px; border: 1px solid #eee; border-radius: 8px;">
                <button onclick="savePost()" style="background: #7baaff; color: white; border: none; padding: 10px 30px; border-radius: 10px; font-weight: bold; cursor: pointer;">등록하기</button>
            </div>
        </div>

        <div id="display-list"></div>
    </div>

    <script>
        const MASTER_KEY = "1234";

        function savePost() {
            const txt = document.getElementById('input-text').value;
            const pw = document.getElementById('input-pw').value;
            
            if(!txt) {
                alert("내용을 입력해주세요!");
                return;
            }

            const isAdmin = (pw === MASTER_KEY);
            const list = document.getElementById('display-list');
            const item = document.createElement('div');
            item.className = "msg-box";
            
            item.innerHTML = `
                <div>${isAdmin ? '<span class="admin-tag">[관리자]</span>' : '<b>익명</b>'}</div>
                <div style="margin-top:8px; font-size:14px;">${txt}</div>
                <div style="margin-top:10px;">
                    <button onclick="this.closest('.msg-box').remove()" style="color:red; border:none; background:none; cursor:pointer; font-size:11px;">삭제</button>
                    ${isAdmin ? '<button onclick="addReply(this)" style="color:#7baaff; border:none; background:none; cursor:pointer; font-size:11px; margin-left:10px;">답글</button>' : ''}
                </div>
                <div class="reply-wrap"></div>
            `;

            list.prepend(item);
            document.getElementById('input-text').value = "";
            document.getElementById('input-pw').value = "";
        }

        function addReply(btn) {
            const comment = prompt("관리자 답글을 입력하세요.");
            if(comment) {
                const wrap = btn.parentElement.nextElementSibling;
                wrap.innerHTML += `<div style="font-size:13px; margin-top:5px; padding-left:10px; border-left:2px solid #7baaff;"><b>↳ 관리자:</b> ${comment}</div>`;
            }
        }
    </script>
</body>
</html>

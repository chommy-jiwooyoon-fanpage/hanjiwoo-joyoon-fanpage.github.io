<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>익명게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        body { margin: 0; padding: 0; background: #eef2f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .side-nav { position: fixed; left: 30px; top: 30px; }
        .nav-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        /* 제목만 프리텐다드 적용 */
        .main-title { margin-top: 80px; font-family: 'Pretendard', sans-serif; font-size: 1.8rem; font-weight: 700; color: #7a94b5; letter-spacing: 8px; text-align: center; }
        .board-container { width: 90%; max-width: 600px; margin-top: 40px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 100px; border: 1px solid #f0f0f0; border-radius: 12px; padding: 15px; resize: none; box-sizing: border-box; font-size: 0.9rem; color: #666; }
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn { padding: 8px 22px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .btn-reg { background: #8ea8c9; color: white; } 
        .btn-del { background: #f8f8f8; color: #aaa; }  
        .comment-list { margin-top: 30px; border-top: 1px solid #f5f5f5; padding-top: 20px; }
        .comment-item { padding: 15px 0; color: #555; font-size: 0.95rem; }
        .comment-meta { font-size: 0.75rem; color: #bbb; margin-bottom: 5px; }
        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #8ea8c9; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="side-nav"><a href="index.html" class="nav-btn">🏠</a></div>
    <h1 class="main-title">익 명 게 시 판</h1>
    <div class="board-container">
        <textarea placeholder="익명으로 자유롭게 남겨주세요."></textarea>
        <div class="btn-group">
            <button class="btn btn-del">삭제</button>
            <button class="btn btn-reg">등록</button>
        </div>
        <div class="comment-list">
            <div class="comment-item">
                <div class="comment-meta">익명 | 2026-03-06</div>
                <div>깔끔한 게시판 테스트입니다.</div>
            </div>
        </div>
    </div>
    <a href="menu.html" class="back-link">← BACK TO MENU</a>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>익명게시판</title>
    <style>
        body { margin: 0; padding: 0; background: #eef2f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
        
        .side-nav { position: fixed; left: 30px; top: 30px; }
        .nav-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        /* [수정] 제목: 촌스럽지 않게 두께와 간격 재조정 */
        .main-title { 
            margin-top: 100px; /* 위쪽 여유 */
            margin-bottom: -10px; /* [핵심] 하얀 박스와 더 가깝게 붙임 */
            font-size: 1.6rem; 
            font-weight: 600; /* 너무 얇지 않은 적당한 세련미 */
            color: #8ea8c9; 
            letter-spacing: 4px; /* 자간을 줄여서 더 단단한 느낌 */
            text-align: center;
        }

        /* 하얀색 메모장 박스 */
        .board-container { 
            width: 90%; max-width: 600px; 
            background: white; border-radius: 25px; padding: 35px; 
            box-shadow: 0 15px 35px rgba(142, 168, 201, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 입력창 스타일 */
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        textarea { 
            width: 100%; height: 110px; border: 1px solid #f2f4f7; 
            border-radius: 15px; padding: 18px; resize: none; 
            box-sizing: border-box; font-size: 0.95rem; color: #555;
            background: #fafbfc;
        }
        
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; }
        .btn { padding: 10px 25px; border: none; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .btn-reg { background: #8ea8c9; color: white; } 
        .btn-del { background: #f1f3f5; color: #999; }  

        /* 리스트 영역 */
        .comment-list { margin-top: 30px; border-top: 1px solid #f8f9fa; padding-top: 25px; }
        .comment-item { padding: 18px 0; border-bottom: 1px solid #fbfcfe; color: #444; font-size: 1rem; }
        .comment-meta { font-size: 0.75rem; color: #c0c8d1; margin-bottom: 6px; font-weight: 500; }

        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #b0c4de; font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="side-nav"><a href="index.html" class="nav-btn">🏠</a></div>
    
    <h1 class="main-title">익 명 게 시 판</h1>

    <div class="board-container">
        <div class="input-group">
            <textarea placeholder="나누고 싶은 이야기를 들려주세요."></textarea>
            <div class="btn-group">
                <button class="btn btn-del">삭제</button>
                <button class="btn btn-reg">등록</button>
            </div>
        </div>

        <div class="comment-list">
            <div class="comment-item">
                <div class="comment-meta">ANONYMOUS | 2026. 03. 06</div>
                <div>이제야 게시판이랑 제목이 딱 어울리네요!</div>
            </div>
        </div>
    </div>

    <a href="menu.html" class="back-link">← BACK TO MENU</a>

</body>
</html>

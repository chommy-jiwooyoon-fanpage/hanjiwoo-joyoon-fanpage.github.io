<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>익명게시판</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 1. 기본 폰트를 프리텐다드로 고정 */
        body { 
            margin: 0; padding: 0; background: #eef2f6; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        .side-nav { position: fixed; left: 30px; top: 30px; }
        .nav-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        /* 2. 제목 디자인: 얇으면서도 힘 있는 세련미 */
        .main-title { 
            margin-top: 110px; 
            margin-bottom: 25px;
            font-size: 1.5rem; 
            font-weight: 700; 
            color: #8ea8c9; 
            letter-spacing: 6px; /* 자간을 세련되게 넓힘 */
            text-align: center;
            text-transform: uppercase;
        }

        /* 3. 하얀색 메모장 박스: 더 부드러운 그림자 */
        .board-container { 
            width: 90%; max-width: 580px; 
            background: white; border-radius: 28px; padding: 40px; 
            box-shadow: 0 20px 40px rgba(142, 168, 201, 0.08); 
        }

        /* 4. 입력창 디자인: 테두리 없이 깔끔하게 */
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        textarea { 
            width: 100%; height: 120px; border: none; 
            border-radius: 18px; padding: 20px; resize: none; 
            box-sizing: border-box; font-size: 0.95rem; color: #555;
            background: #f8fafc; font-family: inherit;
        }
        textarea:focus { outline: 1px solid #e2e8f0; }
        
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; }
        .btn { padding: 10px 28px; border: none; border-radius: 25px; cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: inherit; transition: 0.2s; }
        .btn-reg { background: #8ea8c9; color: white; } 
        .btn-del { background: #f1f3f5; color: #999; }  

        /* 5. 리스트 영역: 미니멀한 구성 */
        .comment-list { margin-top: 35px; border-top: 1px solid #f1f5f9; padding-top: 30px; }
        .comment-item { padding: 20px 0; border-bottom: 1px solid #f8fafc; color: #444; font-size: 0.95rem; line-height: 1.6; }
        .comment-meta { font-size: 0.7rem; color: #cbd5e1; margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }

        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #b0c4de; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; }
    </style>
</head>
<body>

    <div class="side-nav"><a href="index.html" class="nav-btn">🏠</a></div>
    
    <h1 class="main-title">GUESTBOOK</h1>

    <div class="board-container">
        <div class="input-group">
            <textarea placeholder="메시지를 입력해주세요."></textarea>
            <div class="btn-group">
                <button class="btn btn-del">삭제</button>
                <button class="btn btn-reg">등록</button>
            </div>
        </div>

        <div class="comment-list">
            <div class="comment-item">
                <div class="comment-meta">ANONYMOUS | 2026. 03. 06</div>
                <div>프리텐다드 폰트를 적용해 훨씬 세련되어진 모습입니다.</div>
            </div>
        </div>
    </div>

    <a href="menu.html" class="back-link">← BACK TO MENU</a>

</body>
</html>

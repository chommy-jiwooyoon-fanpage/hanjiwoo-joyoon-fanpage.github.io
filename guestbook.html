<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>익명게시판</title>
    <style>
        body { margin: 0; padding: 0; background: #eef2f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        
        /* [고정 1] 좌측 상단 아이콘 그룹 - 메인 페이지(6.JPG)와 100% 동일하게 세팅 */
        .side-nav { 
            position: fixed; 
            left: 20px; 
            top: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 9999; 
        }
        /* 메인 페이지의 상단 바 아이콘 스타일(6.JPG 참고) */
        .top-bar-icon {
            width: 100px; height: 45px; /* 사진 속 01 버튼 크기 반영 */
            background: white; border-radius: 25px; 
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 5px;
        }
        .nav-btn { 
            width: 45px; height: 45px; 
            background: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            font-size: 1.2rem;
        }

        /* [고정 2] 우측 하단 BGM 컨트롤러 - 영상 위치 그대로 고정 */
        .bgm-controls { 
            position: fixed; 
            right: 20px; 
            bottom: 20px; 
            display: flex; 
            gap: 10px; 
            z-index: 9999; 
        }
        .bgm-btn { 
            width: 38px; height: 38px; 
            background: #ff4d6d; /* 영상 속 붉은 색상 */
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; border: none; cursor: pointer; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2);
        }

        /* 게시판 본문 스타일 (3.JPG 스타일 유지) */
        .main-title { margin-top: 110px; margin-bottom: 40px; font-size: 1.7rem; color: #8ea8c9; font-weight: 800; letter-spacing: 5px; text-align: center; }
        .board-container { width: 90%; max-width: 620px; background: white; border-radius: 25px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        textarea { width: 100%; height: 110px; border: 1px solid #f5f5f5; border-radius: 15px; padding: 18px; resize: none; box-sizing: border-box; font-size: 0.95rem; color: #666; font-family: inherit; background: #fafafa; }
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn { padding: 9px 24px; border: none; border-radius: 25px; cursor: pointer; font-size: 0.85rem; font-family: inherit; font-weight: 700; }
        .btn-reg { background: #8ea8c9; color: white; } .btn-del { background: #f0f0f0; color: #bbb; }

        /* 댓글 정보 - 익명 | 날짜 사수 (4.JPG 스타일) */
        .comment-list { margin-top: 35px; border-top: 1px solid #f8f8f8; padding-top: 30px; }
        .comment-item { padding: 15px 0; }
        .comment-meta { font-size: 0.75rem; color: #ccc; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        .comment-text { color: #555; font-size: 0.95rem; }

        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #8ea8c9; font-size: 0.8rem; font-weight: 800; }
    </style>
</head>
<body>

    <div class="side-nav">
        <div class="top-bar-icon"><span>|||</span> <span>01</span> <span>→</span></div> <a href="index.html" class="nav-btn">🏠</a> <a href="guestbook.html" class="nav-btn">📝</a> </div>

    <div class="bgm-controls">
        <button class="bgm-btn">🎵</button>
        <button class="bgm-btn">✖</button>
    </div>
    
    <h1 class="main-title">익 명 게 시 판</h1>

    <div class="board-container">
        <textarea placeholder="마음을 담은 메시지를 남겨주세요."></textarea>
        <div class="btn-group">
            <button class="btn btn-del">삭제</button>
            <button class="btn btn-reg">등록</button>
        </div>

        <div class="comment-list">
            <div class="comment-item">
                <div class="comment-meta">ANONYMOUS | 2026-03-06</div>
                <div class="comment-text">훨씬 깔끔하고 예뻐졌네요!</div>
            </div>
        </div>
    </div>

    <a href="menu.html" class="back-link">← BACK TO MENU</a>

</body>
</html>

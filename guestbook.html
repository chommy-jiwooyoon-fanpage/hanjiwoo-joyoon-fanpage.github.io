<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>익명게시판</title>
    <style>
        /* 기본 배경 및 레이아웃 */
        body { margin: 0; padding: 0; background: #eef2f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        
        /* 홈 버튼 (좌상단) */
        .side-nav { position: fixed; left: 30px; top: 30px; }
        .nav-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* 메인 제목 - 30.JPG의 깔끔한 기본 스타일 */
        .main-title { 
            margin-top: 100px; margin-bottom: 35px; 
            font-size: 1.7rem; color: #8ea8c9; font-weight: 800;
            letter-spacing: 5px; text-align: center; 
        }

        /* 게시판 컨테이너 */
        .board-container { width: 90%; max-width: 600px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 입력창 */
        textarea { width: 100%; height: 100px; border: 1px solid #f0f0f0; border-radius: 12px; padding: 15px; resize: none; box-sizing: border-box; font-size: 0.9rem; color: #666; font-family: inherit; }
        
        /* 버튼 그룹 */
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn { padding: 8px 22px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-family: inherit; font-weight: 600; }
        .btn-reg { background: #8ea8c9; color: white; } 
        .btn-del { background: #f8f8f8; color: #aaa; }  

        /* 댓글 리스트 - 작성자 정보(익명|날짜)가 보이는 영역 */
        .comment-list { margin-top: 30px; border-top: 1px solid #f5f5f5; padding-top: 25px; }
        .comment-item { padding: 15px 0; border-bottom: 1px solid #fbfcfe; color: #555; font-size: 0.95rem; }
        .comment-meta { font-size: 0.75rem; color: #bbb; margin-bottom: 6px; font-weight: 600; }

        /* 하단 뒤로가기 링크 */
        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #8ea8c9; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>

    <div class="side-nav"><a href="index.html" class="nav-btn">🏠</a></div>
    
    <h1 class="main-title">익 명 게 시 판</h1>

    <div class="board-container">
        <div class="input-group">
            <textarea placeholder="익명으로 자유롭게 남겨주세요."></textarea>
            <div class="btn-group">
                <button class="btn btn-del">삭제</button>
                <button class="btn btn-reg">등록</button>
            </div>
        </div>

        <div class="comment-list">
            <div class="comment-item">
                <div class="comment-meta">익명 | 2026-03-06</div>
                <div>깔끔한 게시판 테스트입니다.</div>
            </div>
        </div>
    </div>

    <a href="menu.html" class="back-link">← BACK TO MENU</a>

</body>
</html>

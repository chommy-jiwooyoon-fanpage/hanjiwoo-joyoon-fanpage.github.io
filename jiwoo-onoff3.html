<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지우 - ONnOFF 3</title>
    <style>
        /* 배경: 대문과 동일한 새벽 안개 블루 */
        body { 
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; 
            background: #eef2f6; 
            margin: 0; 
            padding: 100px 20px 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #333; 
        }
        
        /* [초세련] BGM 컨트롤러 (모든 페이지 공통) */
        .bgm-player {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10001;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
        }
        .visualizer { display: flex; align-items: center; gap: 3px; height: 12px; cursor: pointer; }
        .bar { width: 2px; height: 100%; background: #8ea8c9; border-radius: 2px; transition: 0.3s; }
        .playing .bar { animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 12px; } }
        .control-group { display: flex; align-items: center; gap: 12px; border-left: 1px solid rgba(142, 168, 201, 0.3); padding-left: 12px; }
        .btn-icon { cursor: pointer; color: #8ea8c9; font-size: 14px; transition: 0.3s; }
        .btn-icon:hover { color: #7baaff; transform: scale(1.2); }
        .track-num { font-size: 10px; color: #8ea8c9; font-weight: 800; letter-spacing: 1px; }

        /* 홈 아이콘: 플레이어 아래로 배치 */
        .home-btn { 
            position: fixed; 
            top: 85px; 
            left: 30px; 
            width: 45px; 
            height: 45px; 
            background: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.2rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-decoration: none; 
            z-index: 10000; 
            transition: 0.3s;
        }
        .home-btn:hover { transform: scale(1.1); background: #f0f7ff; }

        /* 컨텐츠 영역 */
        .content-container { max-width: 700px; width: 100%; text-align: left; }
        .film-tag { color: #7baaff; font-size: 0.8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
        .main-title { font-size: 1.8rem; font-weight: 800; margin: 0 0 30px 0; border-bottom: 2px solid #fff; padding-bottom: 15px; }

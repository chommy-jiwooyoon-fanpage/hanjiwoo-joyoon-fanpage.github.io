<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조윤 FILMOGRAPHY</title>
    <style>
        /* 화면 정중앙 정렬 설정 */
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            text-align: center; 
            background: #eef2f6; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        /* BGM 플레이어 (왼쪽 상단 고정) */
        .bgm-player { 
            position: fixed; top: 30px; left: 30px; z-index: 10001; 
            display: flex; align-items: center; gap: 15px; padding: 10px 20px; 
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(15px); 
            border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03); 
        }
        .visualizer { display: flex; align-items: center; gap: 3px; height: 12px; cursor: pointer; }
        .bar { width: 2px; height: 100%; background: #8ea8c9; border-radius: 2px; transition: 0.3s; }
        .playing .bar { animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 12px; } }
        .control-group { display: flex; align-items: center; gap: 12px; border-left: 1px solid rgba(142, 168, 201, 0.3); padding-left: 12px; }
        .btn-icon { cursor: pointer; color: #8ea8c9; font-size: 14px; }
        .track-num { font-size: 10px; color: #8ea8c9; font-weight: 800; letter-spacing: 1px; }

        /* 홈/게시판 버튼 (플레이어 아래) */
        .fixed-btn { 
            position: fixed; left: 30px; width: 45px; height: 45px; 
            background: white; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 1.2rem; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 9999; text-decoration: none; 
        }

        /* 타이틀 */
        .header-title { 
            font-size: 1.8rem; font-weight: 800; color: #333; 
            margin-bottom: 50px; letter-spacing: 5px; text-transform: uppercase; 
        }

        /* 작품 아이콘 중앙 열맞춤 */
        .work-grid { 
            display: flex; justify-content: center; gap: 40px; 
            width: 100%; max-width: 600px; 
        }
        .work-item { cursor: pointer; transition: 0.3s; width: 120px; text-decoration: none; }
        .work-icon { 
            width: 100px; height: 100px; background: white; border-radius: 30px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin: 0 auto 15px; border: 1px solid #eee; transition: 0.3s;
        }
        .work-item:hover .work-icon { transform: translateY(-10px); background: #8ea8c9; }
        .work-title { font-size: 0.9rem; font-weight: 700; color: #333; letter-spacing: 1px; }

        /* 하단 링크 */
        .back-link { 
            position: absolute; bottom: 50px; text-decoration: none; 
            color: #bbb; font-size: 0.75rem; letter-spacing: 1px; 
        }
    </style>
</head>
<body>

    <div class="bgm-player">
        <div class="visualizer" id="visualizer" onclick="toggleMusic()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="control-group">
            <div class="track-num" id="track-info">01</div>
            <div class="btn-icon" onclick="nextMusic()">→</div>
        </div>
        <audio id="main-bgm" onended="nextMusic()">
            <source id="audio-source" src="bgm1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <a href="index.html" class="fixed-btn" style="top: 85px;">🏠</a>
    <a href="guestbook.html" class="fixed-btn" style="top: 140px;">💬</a>

    <div class="header-title">CHO YOON</div>

    <div class="work-grid">
        <a href="joyoon-onoff3.html" class="work-item">
            <div class="work-icon">🎬</div>
            <div class="work-title">ONnOFF 3</div>
        </a>
        <a href="#" class="work-item">
            <div class="work-icon">🎞️</div>
            <div class="work-title">다음 작품</div>
        </a>
    </div>

    <a href="menu.html" class="back-link">← SELECT ACTOR 화면으로</a>

    <script>
        const playlist = ["bgm1.mp3", "bgm2.mp3", "bgm3.mp3"]; 
        let currentTrack = 0;
        const music = document.getElementById('main-bgm');
        const source = document.getElementById('audio-source');
        const trackInfo = document.getElementById('track-info');
        const visualizer = document.getElementById('visualizer');

        function toggleMusic() {
            if (music.paused) { music.play(); visualizer.classList.add('playing'); } 
            else { music.pause(); visualizer.classList.remove('playing'); }
        }

        function nextMusic() {
            currentTrack = (currentTrack + 1) % playlist.length;
            source.src = playlist[currentTrack];
            music.load(); music.play();
            trackInfo.innerText = (currentTrack + 1).toString().padStart(2, '0');
            visualizer.classList.add('playing');
        }
    </script>
</body>
</html>
